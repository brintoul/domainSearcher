<!DOCTYPE html>
<html>
<head>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      padding: 12px;
      margin: 0;
    }
    .field {
      margin-bottom: 12px;
      position: relative;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.85em;
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      border: 1px solid #ccc;
      border-top: none;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      z-index: 10;
    }
    .autocomplete-item {
      padding: 6px 8px;
      cursor: pointer;
      list-style: none;
    }
    .autocomplete-item:hover,
    .autocomplete-item.highlighted {
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <div class="field">
    <label for="search-term">Search for:</label>
    <input type="text" id="search-term" placeholder="Enter search terms...">
  </div>
  <div class="field">
    <label for="search">Domain to search:</label>
    <input type="text" id="search" placeholder="Start typing...">
    <div id="autocomplete-list"></div>
  </div>
  <button id="search-btn">Search</button>
  <script src="script.js"></script>
</body>
</html>
